<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Simplified training area map around Reno-Tahoe (RNO). Common practice areas lie northeast of the field, with nearby airports KRTS, KMLC, KLOL, and KSPZ. Confirm with current sectional chart before flight.">
  <rect width="800" height="600" fill="#F7F4EC" />
  <path d="M0 380 L120 320 L240 350 L360 280 L500 300 L640 240 L800 260 L800 600 L0 600 Z" fill="#E3EFF7" stroke="#5A6573" stroke-width="1" />
  <text x="20" y="340" font-size="14" fill="#5A6573" font-family="Inter, sans-serif">Sierra ridge</text>
  <circle cx="420" cy="360" r="140" fill="none" stroke="#C89F4F" stroke-width="2" stroke-dasharray="8 6" />
  <text x="560" y="230" font-size="13" fill="#C89F4F" font-family="Inter, sans-serif" font-weight="600">Class C boundary (simplified)</text>
  <ellipse cx="620" cy="220" rx="90" ry="60" fill="#DDB970" fill-opacity="0.25" stroke="#C89F4F" stroke-width="2" />
  <text x="570" y="225" font-size="14" fill="#0B1C2C" font-family="Inter, sans-serif" font-weight="600">Common practice area</text>
  <text x="560" y="245" font-size="12" fill="#5A6573" font-family="Inter, sans-serif">Altitude and airspace notes</text>
  <circle cx="420" cy="360" r="8" fill="#0B1C2C" />
  <text x="435" y="365" font-size="16" fill="#0B1C2C" font-family="IBM Plex Mono, monospace" font-weight="600">RNO</text>
  <g>
    <circle cx="300" cy="160" r="5" fill="#E87A2A" />
    <text x="312" y="165" font-size="13" fill="#0B1C2C" font-family="IBM Plex Mono, monospace">KRTS</text>
  </g>
  <g>
    <circle cx="520" cy="140" r="5" fill="#E87A2A" />
    <text x="532" y="145" font-size="13" fill="#0B1C2C" font-family="IBM Plex Mono, monospace">KMLC</text>
  </g>
  <g>
    <circle cx="680" cy="120" r="5" fill="#E87A2A" />
    <text x="692" y="125" font-size="13" fill="#0B1C2C" font-family="IBM Plex Mono, monospace">KLOL</text>
  </g>
  <g>
    <circle cx="600" cy="420" r="5" fill="#E87A2A" />
    <text x="612" y="425" font-size="13" fill="#0B1C2C" font-family="IBM Plex Mono, monospace">KSPZ</text>
  </g>
  <g transform="translate(20, 520)">
    <rect width="280" height="70" fill="#FFFFFF" stroke="#142A3D" stroke-width="1" rx="6" />
    <circle cx="20" cy="20" r="6" fill="#0B1C2C" />
    <text x="34" y="24" font-size="12" fill="#0B1C2C" font-family="Inter, sans-serif">Field / airport</text>
    <circle cx="20" cy="45" r="5" fill="#E87A2A" />
    <text x="34" y="49" font-size="12" fill="#0B1C2C" font-family="Inter, sans-serif">Nearby airport</text>
    <line x1="130" y1="20" x2="150" y2="20" stroke="#C89F4F" stroke-width="2" stroke-dasharray="6 4" />
    <text x="158" y="24" font-size="12" fill="#0B1C2C" font-family="Inter, sans-serif">Class C boundary</text>
  </g>
</svg>
